name: build&test_macos

on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
    - name: Checkout repo
      uses: actions/checkout@v2
      with:
        submodules: recursive
    - name: get libomp
      run: brew install libomp
    - name: make epa
      run: make -j
    - name: run tests
      run: ./test/bin/epa_test
